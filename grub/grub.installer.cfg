set timeout=10
set gfxmode=1920x1080,auto

set theme=($root)/boot/grub/themes/utile/theme.txt
export theme

loadfont unicode
loadfont ubuntu-sans-bold-18
loadfont ubuntu-sans-bold-20
loadfont ubuntu-sans-bold-24
loadfont ubuntu-sans-extrabold-20

set menu_color_normal=white/black
set menu_color_highlight=black/light-gray

menuentry "Try or Install Utile" --class utile --class ubuntu --class gnu-linux --class gnu --class os {
    set gfxpayload=keep
    linux  /casper/vmlinuz  --- quiet splash
    initrd /casper/initrd
}
menuentry "Utile (safe graphics)" --class utile --class ubuntu --class gnu-linux --class gnu --class os {
    set gfxpayload=keep
    linux  /casper/vmlinuz nomodeset  --- quiet splash
    initrd /casper/initrd
}
grub_platform
if [ "$grub_platform" = "efi" ]; then
menuentry 'Boot from next volume' {
    exit 1
}
menuentry 'UEFI Firmware Settings' {
    fwsetup
}
fi
